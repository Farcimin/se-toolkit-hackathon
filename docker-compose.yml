services:
  db:
    image: harbor.pg.innopolis.university/docker-hub-cache/postgres:16-alpine
    environment:
      POSTGRES_USER: siddur
      POSTGRES_PASSWORD: siddur
      POSTGRES_DB: siddur
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siddur"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://siddur:siddur@db:5432/siddur
    volumes:
      - ./audio:/app/audio
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
